<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RIV OS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
// Lightweight Supabase client — no CDN dependency
// Handles auth + database calls natively via fetch
window.supabase = (function() {
  function createClient(url, key) {
    var _url = url;
    var _key = key;
    var _session = null;

    // ── Storage helpers ──
    function store(k, v) { try { localStorage.setItem(k, v); } catch(e){} }
    function retrieve(k) { try { return localStorage.getItem(k); } catch(e){ return null; } }
    function remove(k)   { try { localStorage.removeItem(k); } catch(e){} }

    // ── Restore session on load ──
    var stored = retrieve('rivos_session');
    if (stored) { try { _session = JSON.parse(stored); } catch(e){} }

    // ── Auth ──
    var auth = {
      getSession: function() {
        return Promise.resolve({ data: { session: _session }, error: null });
      },
      signInWithPassword: function(opts) {
        return fetch(_url + '/auth/v1/token?grant_type=password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': _key },
          body: JSON.stringify({ email: opts.email, password: opts.password })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.error || data.error_description || !data.access_token) {
            return { data: {}, error: { message: data.error_description || data.msg || 'Invalid credentials' } };
          }
          _session = { access_token: data.access_token, user: { email: opts.email, id: data.user && data.user.id } };
          store('rivos_session', JSON.stringify(_session));
          return { data: { session: _session }, error: null };
        })
        .catch(function(err) {
          return { data: {}, error: { message: err.message } };
        });
      },
      signOut: function() {
        _session = null;
        remove('rivos_session');
        return Promise.resolve({ error: null });
      }
    };

    // ── Database (select/insert/update/delete) ──
    function _headers() {
      var h = { 'apikey': _key, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
      if (_session && _session.access_token) h['Authorization'] = 'Bearer ' + _session.access_token;
      return h;
    }

    function from(table) {
      var _table = table;
      var _filters = [];
      var _select = '*';
      var _method = 'GET';
      var _body = null;

      var q = {
        select: function(cols) { _select = cols || '*'; _method = 'GET'; return q; },
        eq:     function(col, val) { _filters.push(col + '=eq.' + encodeURIComponent(val)); return q; },
        order:  function() { return q; },
        limit:  function() { return q; },
        insert: function(data) {
          _method = 'POST';
          _body = JSON.stringify(Array.isArray(data) ? data : [data]);
          return q;
        },
        update: function(data) {
          _method = 'PATCH';
          _body = JSON.stringify(data);
          return q;
        },
        delete: function() {
          _method = 'DELETE';
          return q;
        },
        then: function(resolve) {
          var headers = _headers();
          var filterStr = _filters.length ? '?' + _filters.join('&') : '';
          var fetchUrl;
          var fetchOpts = { method: _method, headers: headers };

          if (_method === 'GET') {
            var sep = _filters.length ? '&' : '?';
            fetchUrl = _url + '/rest/v1/' + _table + '?select=' + _select + (_filters.length ? '&' + _filters.join('&') : '');
          } else {
            fetchUrl = _url + '/rest/v1/' + _table + filterStr;
          }

          if (_body) fetchOpts.body = _body;

          return fetch(fetchUrl, fetchOpts)
            .then(function(r) {
              if (_method !== 'GET') {
                resolve({ data: null, error: r.ok ? null : { message: 'Request failed: ' + r.status } });
                return;
              }
              return r.json().then(function(data) {
                resolve({ data: Array.isArray(data) ? data : [], error: null });
              });
            })
            .catch(function(err) { resolve({ data: [], error: { message: err.message } }); });
        }
      };
      return q;
    }

    return { auth: auth, from: from };
  }

  return { createClient: createClient };
})();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:    #0a0a0f;
    --surface:  #13131a;
    --card:     #1c1c26;
    --border:   #2a2a38;
    --purple:   #7c5cbf;
    --purple-light: #9b7dd4;
    --purple-glow: rgba(124,92,191,0.18);
    --gold:     #c9a84c;
    --white:    #f0ede8;
    --muted:    #8888a0;
    --green:    #4caf7c;
    --red:      #e05555;
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans:  'Outfit', system-ui, sans-serif;
  }

  html, body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-sans);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── SCREENS ─── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ─── LOGIN SCREEN ─── */
  #screen-login {
    background: var(--black);
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
    overflow: hidden;
  }

  .login-glow {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,92,191,0.25) 0%, transparent 70%);
    top: -100px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }

  .login-box {
    width: 100%; max-width: 380px;
    position: relative; z-index: 1;
  }

  .login-logo {
    text-align: center;
    margin-bottom: 48px;
  }

  .login-logo-badge {
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 72px; height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--purple) 0%, #5a3d96 100%);
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(124,92,191,0.4);
  }

  .login-logo-badge span {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
  }

  .login-logo h1 {
    font-family: var(--font-serif);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--white);
  }

  .login-logo p {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .login-form { display: flex; flex-direction: column; gap: 14px; }

  .input-group { display: flex; flex-direction: column; gap: 6px; }

  .input-group label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .input-group input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: var(--font-sans);
    font-size: 15px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .input-group input:focus { border-color: var(--purple); }
  .input-group input::placeholder { color: var(--muted); }

  .btn-primary {
    background: linear-gradient(135deg, var(--purple) 0%, #5a3d96 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 4px 20px rgba(124,92,191,0.35);
    transition: opacity 0.2s, transform 0.1s;
    -webkit-appearance: none;
  }

  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .login-error {
    background: rgba(224,85,85,0.12);
    border: 1px solid rgba(224,85,85,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--red);
    display: none;
  }

  .login-error.visible { display: block; }

  .login-footer {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: var(--muted);
  }

  /* ─── TOP NAV ─── */
  .topnav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    flex-shrink: 0;
  }

  .topnav-brand {
    display: flex; align-items: center; gap: 10px;
  }

  .topnav-badge {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--purple) 0%, #5a3d96 100%);
    display: flex; align-items: center; justify-content: center;
  }

  .topnav-badge span {
    font-family: var(--font-serif);
    font-size: 13px; font-weight: 900; color: #fff;
  }

  .topnav-title {
    font-family: var(--font-serif);
    font-size: 18px; font-weight: 700;
    color: var(--white);
  }

  .topnav-right { display: flex; align-items: center; gap: 12px; }

  .avatar-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--purple-glow);
    border: 2px solid var(--purple);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 14px; font-weight: 700; color: var(--purple-light);
    font-family: var(--font-sans);
  }

  /* ─── BOTTOM NAV ─── */
  .bottomnav {
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .nav-item {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 10px 4px;
    cursor: pointer;
    gap: 3px;
    border: none; background: none;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label {
    font-size: 10px; font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.3px;
  }
  .nav-item.active .nav-label { color: var(--purple-light); }
  .nav-item.active .nav-icon { filter: brightness(1.4); }

  /* ─── MAIN CONTENT ─── */
  .main-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 90px;
  }

  /* ─── DASHBOARD ─── */
  .welcome-block {
    margin-bottom: 24px;
  }

  .welcome-eyebrow {
    font-size: 11px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--purple-light);
    margin-bottom: 4px;
  }

  .welcome-name {
    font-family: var(--font-serif);
    font-size: 28px; font-weight: 700;
    color: var(--white);
    line-height: 1.1;
  }

  .welcome-role {
    font-size: 13px; color: var(--muted);
    margin-top: 4px;
  }

  /* ─── STAT CARDS ─── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }

  .stat-card.accent {
    background: linear-gradient(135deg, rgba(124,92,191,0.2) 0%, rgba(90,61,150,0.1) 100%);
    border-color: rgba(124,92,191,0.35);
  }

  .stat-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }

  .stat-value {
    font-family: var(--font-serif);
    font-size: 32px; font-weight: 700;
    color: var(--white); line-height: 1;
  }

  .stat-value.purple { color: var(--purple-light); }
  .stat-value.gold   { color: var(--gold); }
  .stat-value.green  { color: var(--green); }

  .stat-sub {
    font-size: 12px; color: var(--muted);
    margin-top: 4px;
  }

  /* ─── SECTION HEADERS ─── */
  .section-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-family: var(--font-serif);
    font-size: 18px; font-weight: 600;
    color: var(--white);
  }

  .section-link {
    font-size: 12px; color: var(--purple-light);
    cursor: pointer; font-weight: 500;
  }

  /* ─── MODULE GRID ─── */
  .modules-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .module-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 14px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    display: flex; flex-direction: column;
    align-items: flex-start; gap: 10px;
  }

  .module-card:active { transform: scale(0.97); }
  .module-card:hover  { border-color: var(--purple); }

  .module-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .module-icon.purple { background: rgba(124,92,191,0.18); }
  .module-icon.gold   { background: rgba(201,168,76,0.15); }
  .module-icon.green  { background: rgba(76,175,124,0.15); }
  .module-icon.blue   { background: rgba(76,130,220,0.15); }
  .module-icon.red    { background: rgba(224,85,85,0.15); }

  .module-name {
    font-size: 13px; font-weight: 600;
    color: var(--white);
    line-height: 1.2;
  }

  .module-desc {
    font-size: 11px; color: var(--muted);
    line-height: 1.4;
  }

  .module-locked {
    opacity: 0.35;
    pointer-events: none;
  }

  /* ─── ANNOUNCEMENT CARDS ─── */
  .announcement-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
  }

  .ann-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .ann-tag {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 6px;
  }

  .ann-tag.purple {
    background: rgba(124,92,191,0.2);
    color: var(--purple-light);
  }

  .ann-tag.gold {
    background: rgba(201,168,76,0.15);
    color: var(--gold);
  }

  .ann-tag.green {
    background: rgba(76,175,124,0.15);
    color: var(--green);
  }

  .ann-date { font-size: 11px; color: var(--muted); }

  .ann-title {
    font-weight: 600; font-size: 14px;
    color: var(--white); margin-bottom: 6px;
  }

  .ann-body { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* ─── LEADERBOARD ─── */
  .lb-row {
    display: flex; align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .lb-row:last-child { border-bottom: none; }

  .lb-rank {
    font-family: var(--font-serif);
    font-size: 18px; font-weight: 700;
    width: 28px; text-align: center;
    flex-shrink: 0;
  }

  .lb-rank.gold-rank  { color: var(--gold); }
  .lb-rank.silver-rank{ color: #b0b0c0; }
  .lb-rank.bronze-rank{ color: #cd7f32; }
  .lb-rank.other-rank { color: var(--muted); }

  .lb-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--purple-glow);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--purple-light);
    flex-shrink: 0;
  }

  .lb-info { flex: 1; min-width: 0; }
  .lb-name { font-size: 14px; font-weight: 600; color: var(--white); }
  .lb-meta { font-size: 12px; color: var(--muted); }

  .lb-score {
    font-family: var(--font-serif);
    font-size: 20px; font-weight: 700;
    color: var(--purple-light);
    text-align: right;
  }

  .lb-score-label { font-size: 10px; color: var(--muted); text-align: right; }

  /* ─── ROSTER ─── */
  .search-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--white);
    width: 100%;
    outline: none;
    margin-bottom: 16px;
    -webkit-appearance: none;
  }

  .search-bar::placeholder { color: var(--muted); }
  .search-bar:focus { border-color: var(--purple); }

  .roster-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
  }

  .roster-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--purple-glow);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: var(--purple-light);
    flex-shrink: 0;
  }

  .roster-info { flex: 1; min-width: 0; }
  .roster-name { font-size: 14px; font-weight: 600; color: var(--white); }
  .roster-role { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .roster-region {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--purple-light);
  }

  .role-badge {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 6px;
    flex-shrink: 0;
  }

  .role-badge.admin   { background: rgba(201,168,76,0.15); color: var(--gold); }
  .role-badge.manager { background: rgba(124,92,191,0.2);  color: var(--purple-light); }
  .role-badge.closer  { background: rgba(76,175,124,0.15); color: var(--green); }
  .role-badge.setter  { background: rgba(76,130,220,0.15); color: #7eb4f0; }
  .role-badge.backender { background: rgba(224,140,55,0.15); color: #e09c55; }

  /* ─── PROFILE / SETTINGS ─── */
  .profile-header {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    padding: 24px 0 20px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .profile-avatar-lg {
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple) 0%, #5a3d96 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; color: #fff;
    font-family: var(--font-serif);
    box-shadow: 0 4px 24px rgba(124,92,191,0.4);
  }

  .profile-name {
    font-family: var(--font-serif);
    font-size: 22px; font-weight: 700; color: var(--white);
  }

  .profile-role-region {
    font-size: 13px; color: var(--muted); text-align: center;
  }

  .settings-section {
    margin-bottom: 24px;
  }

  .settings-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }

  .settings-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .settings-item {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .settings-item:last-child { border-bottom: none; }

  .settings-item-left { display: flex; align-items: center; gap: 12px; }
  .settings-item-icon { font-size: 18px; width: 24px; text-align: center; }
  .settings-item-text { font-size: 14px; color: var(--white); }
  .settings-item-arrow { font-size: 14px; color: var(--muted); }

  .btn-logout {
    background: rgba(224,85,85,0.1);
    border: 1px solid rgba(224,85,85,0.3);
    color: var(--red);
    border-radius: 12px;
    padding: 14px;
    font-family: var(--font-sans);
    font-size: 14px; font-weight: 600;
    cursor: pointer; width: 100%;
    margin-top: 12px;
    -webkit-appearance: none;
  }

  /* ─── PERMISSION BADGE ROW ─── */
  .permission-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 12px;
  }

  .perm-chip {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.8px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 20px;
    background: rgba(124,92,191,0.15);
    border: 1px solid rgba(124,92,191,0.3);
    color: var(--purple-light);
  }

  .perm-chip.locked {
    background: rgba(136,136,160,0.08);
    border-color: var(--border);
    color: var(--muted);
    opacity: 0.5;
  }

  /* ─── LOADING SPINNER ─── */
  .loading-screen {

// ─── LOAD USER PROFILE (Supabase-first, seed fallback) ───
function loadUserProfile(email) {
  // Direct fetch with service-level access — bypasses RLS for profile lookup
  var headers = {
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Content-Type': 'application/json'
  };

  // Get session token if available and use it
  db.auth.getSession().then(function(s) {
    if (s.data && s.data.session && s.data.session.access_token) {
      headers['Authorization'] = 'Bearer ' + s.data.session.access_token;
    }

    var profileUrl = SUPA_URL + '/rest/v1/profiles?select=*&email=eq.' + encodeURIComponent(email);
    fetch(profileUrl, { headers: headers })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data || !Array.isArray(data) || data.length === 0) {
          loadFromSeed(email);
          return;
        }
        var profile = data[0];
        var permUrl = SUPA_URL + '/rest/v1/permissions?select=module&user_id=eq.' + encodeURIComponent(profile.id);
        fetch(permUrl, { headers: headers })
          .then(function(r2) { return r2.json(); })
          .then(function(permData) {
            var perms = [];
            if (Array.isArray(permData) && permData.length > 0) {
              perms = permData.map(function(p) { return p.module; });
            }
            if (perms.length === 0) {
              perms = (ROLE_DEFAULTS[profile.role] || ROLE_DEFAULTS['setter']).slice();
            }
            APP.profile = {
              id:       profile.id,
              name:     profile.name,
              initials: profile.initials || profile.name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase(),
              role:     profile.role,
              region:   profile.region,
              team:     profile.team,
              active:   profile.active
            };
            APP.permissions = perms;
            loadSupabaseAnnouncements();
            buildApp();
            showScreen('app');
          })
          .catch(function() { loadFromSeedWithName(email, profile); });
      })
      .catch(function() { loadFromSeed(email); });
  }).catch(function() { loadFromSeed(email); });
}

// Fallback that at least uses the name from Supabase if perms fail
function loadFromSeedWithName(email, profile) {
  APP.profile = {
    id:       profile.id,
    name:     profile.name,
    initials: profile.initials || 'AT',
    role:     profile.role || 'setter',
    region:   profile.region || 'Unknown',
    team:     profile.team || 'Unknown',
    active:   true
  };
  APP.permissions = (ROLE_DEFAULTS[profile.role] || ROLE_DEFAULTS['setter']).slice();
  buildApp();
  showScreen('app');
}

function loadFromSeed(email) {
  var seed = SEED_USERS[email];
  if (seed) {
    APP.profile = seed;
    APP.permissions = seed.permissions;
  } else {
    APP.profile = {
      name: email.split('@')[0],
      initials: email.substring(0,2).toUpperCase(),
      role: 'setter', region: 'Unknown', team: 'Unknown'
    };
    APP.permissions = ROLE_DEFAULTS['setter'].slice();
  }
  buildApp();
  showScreen('app');
}

// ─── LOAD ANNOUNCEMENTS FROM SUPABASE ───
function loadSupabaseAnnouncements() {
  db.from('announcements').select('*')
    .then(function(result) {
      if (result.error || !result.data || result.data.length === 0) return;
      var tagClassMap = { Company:'purple', Competition:'gold', Trip:'green', Promotion:'purple', Urgent:'red' };
      var remote = result.data.map(function(a) {
        return {
          tag:      a.tag || 'Company',
          tagClass: tagClassMap[a.tag] || 'purple',
          date:     a.created_at ? new Date(a.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '',
          title:    a.title,
          body:     a.body
        };
      });
      // Merge: remote announcements first, then local seed ones not already present
      ANNOUNCEMENTS = remote.concat(ANNOUNCEMENTS.filter(function(a) {
        return !remote.find(function(r){ return r.title === a.title; });
      }));
    })
    .catch(function() {});
}

function switchLBTab(el, tab) {

}

// ── TRAINING MODULE DETAIL ──
function renderSetterModule() {
  var mod = null;
  for (var i = 0; i < TRAINING_MODULES.length; i++) {
    if (TRAINING_MODULES[i].id === SETTER_STATE.module) { mod = TRAINING_MODULES[i]; break; }
  }
  if (!mod) return renderSetterTrainingList();

  var step = mod.steps[SETTER_STATE.moduleStep];
  var total = mod.steps.length;
  var current = SETTER_STATE.moduleStep;
  var pct = Math.round(((current + 1) / total) * 100);

  // Step dots
  var dots = '';
  for (var d = 0; d < total; d++) {
    var dotStyle = d === current
      ? 'width:20px;height:8px;border-radius:4px;background:var(--purple);display:inline-block;margin:0 3px;'
      : 'width:8px;height:8px;border-radius:50%;background:var(--border);display:inline-block;margin:0 3px;';
    dots += '<span style="' + dotStyle + '"></span>';
  }

  var prevBtn = current > 0
    ? '<button onclick="setterStep(' + (current-1) + ')" style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;color:var(--white);font-family:var(--font-sans);font-size:14px;font-weight:600;cursor:pointer;">‹ Prev</button>'
    : '<div style="flex:1;"></div>';

  var nextBtn = current < total - 1
    ? '<button onclick="setterStep(' + (current+1) + ')" style="flex:1;background:linear-gradient(135deg,var(--purple),#5a3d96);border:none;border-radius:12px;padding:13px;color:#fff;font-family:var(--font-sans);font-size:14px;font-weight:600;cursor:pointer;">Next ›</button>'
    : '<button onclick="setterNav(\'training\')" style="flex:1;background:linear-gradient(135deg,var(--green),#2d8a5a);border:none;border-radius:12px;padding:13px;color:#fff;font-family:var(--font-sans);font-size:14px;font-weight:600;cursor:pointer;">Complete ✓</button>';

  return (
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">' +
      '<button onclick="setterNav(\'training\')" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--white);font-family:var(--font-sans);font-size:13px;cursor:pointer;">‹ Back</button>' +
      '<div>' +
        '<div style="font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;">' + mod.title + '</div>' +
        '<div style="font-size:12px;color:var(--purple-light);font-weight:600;">Step ' + (current+1) + ' of ' + total + '</div>' +
      '</div>' +
    '</div>' +

    // Progress bar
    '<div style="height:4px;background:var(--border);border-radius:2px;margin-bottom:24px;overflow:hidden;">' +
      '<div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,var(--purple),var(--purple-light));border-radius:2px;transition:width 0.3s;"></div>' +
    '</div>' +

    // Step card
    '<div style="background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:20px;">' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--purple-light);margin-bottom:10px;">STEP ' + (current+1) + '</div>' +
      '<div style="font-family:var(--font-serif);font-size:20px;font-weight:700;color:var(--white);margin-bottom:14px;">' + step.title + '</div>' +
      '<div style="font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:16px;">' + step.body + '</div>' +
      '<div style="background:rgba(124,92,191,0.1);border:1px solid rgba(124,92,191,0.25);border-radius:10px;padding:12px 14px;">' +
        '<div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--purple-light);margin-bottom:4px;">💡 PRO TIP</div>' +
        '<div style="font-size:13px;color:var(--white);line-height:1.5;">' + step.tip + '</div>' +
      '</div>' +
    '</div>' +

    // Step dots
    '<div style="text-align:center;margin-bottom:20px;">' + dots + '</div>' +

    // Nav buttons
    '<div style="display:flex;gap:10px;">' + prevBtn + nextBtn + '</div>'
  );
}

  document.getElementById('main-content').innerHTML = renderSetterModule();

// ── METRICS ──
function renderSetterMetrics() {
  var m = SETTER_STATE.metrics;
  var contactRate = m.doors > 0   ? Math.round((m.contacts / m.doors)  * 100) : 0;
  var pitchRate   = m.contacts > 0? Math.round((m.pitches  / m.contacts)* 100) : 0;
  var apptRate    = m.pitches > 0 ? Math.round((m.appts    / m.pitches) * 100) : 0;
  var closeRate   = m.sits > 0    ? Math.round((m.closes   / m.sits)    * 100) : 0;

  function metricRow(label, fieldIdx, val) {
    return (
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);">' +
        '<div style="font-size:14px;color:var(--white);font-weight:500;">' + label + '</div>' +
        '<div style="display:flex;align-items:center;gap:12px;">' +
          '<button onclick="metricAdj(' + fieldIdx + ',-1)" style="width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--white);font-size:18px;cursor:pointer;font-family:var(--font-sans);">−</button>' +
          '<div style="font-family:var(--font-serif);font-size:22px;font-weight:700;color:var(--purple-light);width:36px;text-align:center;" id="mval-' + fieldIdx + '">' + val + '</div>' +
          '<button onclick="metricAdj(' + fieldIdx + ',1)" style="width:32px;height:32px;border-radius:8px;background:var(--purple);border:none;color:#fff;font-size:18px;cursor:pointer;font-family:var(--font-sans);">+</button>' +
        '</div>' +
      '</div>'
    );
  }

  function convRow(label, rate, color) {
    return (
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">' +
        '<div style="font-size:13px;color:var(--muted);">' + label + '</div>' +
        '<div style="font-size:16px;font-weight:700;color:' + color + ';">' + rate + '%</div>' +
      '</div>'
    );
  }

  return (
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">' +
      '<button onclick="setterBack()" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--white);font-family:var(--font-sans);font-size:13px;cursor:pointer;">‹ Back</button>' +
      '<div style="font-family:var(--font-serif);font-size:22px;font-weight:700;color:var(--white);">My Metrics</div>' +
    '</div>' +

    '<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;margin-bottom:16px;">' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Activity Tracker</div>' +
      metricRow('Doors Knocked', 0, m.doors) +
      metricRow('Contacts Made', 1, m.contacts) +
      metricRow('Pitches Given', 2, m.pitches) +
      metricRow('Appointments Set', 3, m.appts) +
      metricRow('Sits (Closer Ran)', 4, m.sits) +
      '<div style="border-bottom:none;">' + metricRow('Closes (Deals)', 5, m.closes).replace('border-bottom:1px solid var(--border)', 'border-bottom:none') + '</div>' +
    '</div>' +

    '<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;">' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Conversion Rates</div>' +
      convRow('Contact Rate (Doors → Contacts)', contactRate, 'var(--purple-light)') +
      convRow('Pitch Rate (Contacts → Pitches)', pitchRate, 'var(--gold)') +
      convRow('Appointment Rate (Pitches → Appts)', apptRate, 'var(--green)') +
      convRow('Close Rate (Sits → Closes)', closeRate, '#e09c55') +
    '</div>'
  );
}

var METRIC_KEYS = ['doors','contacts','pitches','appts','sits','closes'];
function metricAdj(idx, delta) {
  var key = METRIC_KEYS[idx];
  SETTER_STATE.metrics[key] = Math.max(0, (SETTER_STATE.metrics[key] || 0) + delta);
  var el = document.getElementById('mval-' + idx);
  if (el) el.textContent = SETTER_STATE.metrics[key];
}

function updatePayCalc(val) {
  val = parseInt(val);
  var apptDisplay = document.getElementById('pay-appt-display');
  var monthEl = document.getElementById('pay-monthly');
  var annualEl = document.getElementById('pay-annual');
  if (apptDisplay) apptDisplay.textContent = val;

  // Estimate: avg pay per appointment scales with volume
  var avgPay = val <= 5 ? 100 : val <= 10 ? 200 : val <= 15 ? 280 : val <= 20 ? 350 : val <= 25 ? 400 : 450;
  var monthly = val * avgPay;
  var annual  = monthly * 12;

  if (monthEl) monthEl.textContent = '$' + monthly.toLocaleString();
  if (annualEl) annualEl.textContent = '$' + annual.toLocaleString();
}

// ── CLOSING SCRIPT ──
function renderCloserScript() {
  var step = CLOSER_STATE.scriptStep;
  var s    = CLOSING_SCRIPTS[step];
  var total = CLOSING_SCRIPTS.length;
  var pct  = Math.round(((step + 1) / total) * 100);

  var dots = '';
  for (var d = 0; d < total; d++) {
    var ds = d === step
      ? 'width:18px;height:7px;border-radius:4px;background:var(--purple);display:inline-block;margin:0 2px;'
      : 'width:7px;height:7px;border-radius:50%;background:var(--border);display:inline-block;margin:0 2px;';
    dots += '<span style="' + ds + '"></span>';
  }

  var prevBtn = step > 0
    ? '<button onclick="closerScriptStep(' + (step-1) + ')" style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;color:var(--white);font-family:var(--font-sans);font-size:14px;font-weight:600;cursor:pointer;">‹ Prev</button>'
    : '<div style="flex:1;"></div>';

  var nextBtn = step < total - 1
    ? '<button onclick="closerScriptStep(' + (step+1) + ')" style="flex:1;background:linear-gradient(135deg,var(--purple),#5a3d96);border:none;border-radius:12px;padding:13px;color:#fff;font-family:var(--font-sans);font-size:14px;font-weight:600;cursor:pointer;">Next ›</button>'
    : '<button onclick="closerBack()" style="flex:1;background:linear-gradient(135deg,var(--green),#2d8a5a);border:none;border-radius:12px;padding:13px;color:#fff;font-family:var(--font-sans);font-size:14px;font-weight:600;cursor:pointer;">Done ✓</button>';

  return (
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">' +
      '<button onclick="closerBack()" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--white);font-family:var(--font-sans);font-size:13px;cursor:pointer;">‹ Back</button>' +
      '<div>' +
        '<div style="font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;">Closing Script</div>' +
        '<div style="font-size:12px;color:var(--purple-light);font-weight:600;">Step ' + (step+1) + ' of ' + total + '</div>' +
      '</div>' +
    '</div>' +

    '<div style="height:4px;background:var(--border);border-radius:2px;margin-bottom:24px;overflow:hidden;">' +
      '<div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,var(--purple),var(--purple-light));border-radius:2px;transition:width 0.3s;"></div>' +
    '</div>' +

        '<span style="font-size:28px;">' + s.icon + '</span>' +
        '<div>' +

          '<div style="font-family:var(--font-serif);font-size:18px;font-weight:700;color:var(--white);">' + s.phase + '</div>' +
        '</div>' +
      '</div>' +
      '<div style="background:var(--surface);border-radius:12px;padding:16px;margin-bottom:14px;border-left:3px solid var(--purple);">' +

        '<div style="font-size:14px;color:var(--white);line-height:1.75;font-style:italic;">' + s.script + '</div>' +

function renderCloserDeal() {
  var f = CLOSER_STATE.dealForm;

  function field(label, key, type, placeholder) {
    type = type || 'text';
    return (
      '<div style="margin-bottom:14px;">' +
        '<div style="font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">' + label + '</div>' +
        '<input type="' + type + '" placeholder="' + placeholder + '" value="' + (f[key]||'') + '" ' +
        'oninput="dealField(\'' + key + '\',this.value)" ' +
        'style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:var(--font-sans);font-size:14px;color:var(--white);outline:none;-webkit-appearance:none;">' +
      '</div>'
    );
  }

  function selectField(label, key, options) {
    var opts = options.map(function(o) {
      return '<option value="' + o + '"' + (f[key]===o?' selected':'') + '>' + o + '</option>';
    }).join('');
    return (
      '<div style="margin-bottom:14px;">' +
        '<div style="font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">' + label + '</div>' +
        '<select onchange="dealField(\'' + key + '\',this.value)" ' +
        'style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:var(--font-sans);font-size:14px;color:var(--white);outline:none;-webkit-appearance:none;">' +
        opts +
        '</select>' +
      '</div>'
    );

function dealField(key, val) {
  CLOSER_STATE.dealForm[key] = val;

function submitDeal() {
  var f = CLOSER_STATE.dealForm;
  if (!f.homeowner || !f.address || f.utility === 'Select...' || f.utility === '') {
    showToast('Please fill in homeowner name, address, and utility');
    return;
  }
  if (!CLOSER_STATE.deals) CLOSER_STATE.deals = [];

  var localDeal = Object.assign({}, f, {
    id: Date.now(),
    status: 'Survey Pending',
    date: new Date().toLocaleDateString(),
    month: new Date().getMonth()
  });
  CLOSER_STATE.deals.push(localDeal);

  // Write to Supabase
  var supaRecord = {
    homeowner:   f.homeowner,
    address:     f.address,
    utility:     f.utility,
    system_size: f.systemSize,
    battery:     f.battery,
    provider:    f.provider,
    setter_name: f.setter,
    closer_name: f.closer || (APP.profile ? APP.profile.name : ''),
    partner:     f.partner,
    notes:       f.notes,
    status:      'Survey Pending',
    closer_id:   APP.profile && APP.profile.id ? APP.profile.id : null
  };
  db.from('deals').insert(supaRecord)
    .then(function(r) {
      if (!r.error) showToast('Deal saved — ' + f.homeowner);
    })
    .catch(function() {});

  CLOSER_STATE.dealForm = { homeowner:'',address:'',utility:'',systemSize:'',battery:'No',provider:'',setter:'',closer:'',partner:'',notes:'' };
  showToast('Deal submitted — ' + localDeal.homeowner);
  CLOSER_STATE.section = 'pipeline';
  document.getElementById('main-content').innerHTML = renderCloser();
}

// ── PIPELINE ──
function renderCloserPipeline() {
  var deals = CLOSER_STATE.deals || [];

  var statusColors = {
    'Survey Pending':  'var(--gold)',
    'Survey Complete': 'var(--purple-light)',
    'Install Pending': '#7eb4f0',
    'Install Complete':'var(--green)',
    'PTO':             '#4caf7c'
  };

  var statuses = ['Survey Pending','Survey Complete','Install Pending','Install Complete','PTO'];

  var cards = '';
  if (deals.length === 0) {
    cards = '<div style="text-align:center;padding:50px 20px;">' +
      '<div style="font-size:40px;margin-bottom:12px;">📋</div>' +
      '<div style="font-size:16px;font-weight:600;color:var(--white);margin-bottom:8px;">No deals yet</div>' +

      '</div>';
  } else {
    deals.slice().reverse().forEach(function(d) {
      var color = statusColors[d.status] || 'var(--muted)';
      cards += '<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;">';
      cards += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">';
      cards += '<div>';
      cards += '<div style="font-size:15px;font-weight:700;color:var(--white);">' + d.homeowner + '</div>';
      cards += '<div style="font-size:12px;color:var(--muted);margin-top:2px;">' + d.address + '</div>';
      cards += '</div>';
      cards += '<span style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 8px;border-radius:6px;background:rgba(0,0,0,0.3);color:' + color + ';">' + d.status + '</span>';
      cards += '</div>';
      cards += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
      if (d.utility) cards += '<span style="font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--muted);">' + d.utility + '</span>';
      if (d.systemSize) cards += '<span style="font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--muted);">' + d.systemSize + 'kW</span>';
      if (d.setter) cards += '<span style="font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--muted);">Set: ' + d.setter + '</span>';
      cards += '</div>';

      // Status update buttons
      cards += '<div style="display:flex;gap:6px;margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;">';
      statuses.forEach(function(s) {
        var isActive = d.status === s;
        var btnStyle = isActive
          ? 'flex-shrink:0;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:var(--purple);color:#fff;font-family:var(--font-sans);'
          : 'flex-shrink:0;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:var(--font-sans);';
        cards += '<button style="' + btnStyle + '" onclick="updateDealStatus(' + d.id + ',\'' + s + '\')">' + s + '</button>';
      });
      cards += '</div>';
      cards += '</div>';
    });
  }

  return (
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">' +
      '<div style="display:flex;align-items:center;gap:12px;">' +
        '<button onclick="closerBack()" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--white);font-family:var(--font-sans);font-size:13px;cursor:pointer;">‹ Back</button>' +
        '<div style="font-family:var(--font-serif);font-size:22px;font-weight:700;color:var(--white);">Pipeline</div>' +
      '</div>' +
      '<button onclick="closerNav(\'deal\')" style="background:var(--purple);border:none;border-radius:10px;padding:8px 14px;color:#fff;font-family:var(--font-sans);font-size:13px;font-weight:600;cursor:pointer;">+ Deal</button>' +
    '</div>' +
    cards
  );
}

function updateDealStatus(dealId, status) {
  var deals = CLOSER_STATE.deals || [];
  for (var i = 0; i < deals.length; i++) {
    if (deals[i].id === dealId) { deals[i].status = status; break; }
  }
  document.getElementById('main-content').innerHTML = renderCloserPipeline();
  showToast('Status updated: ' + status);
}

function adminEditField(key, val) {
  if (ADMIN_STATE.editingUser) ADMIN_STATE.editingUser[key] = val;
}

function adminTogglePerm(perm) {
  var u = ADMIN_STATE.editingUser;
  if (!u) return;
  var idx = u.permissions.indexOf(perm);
  if (idx !== -1) {
    u.permissions.splice(idx, 1);
  } else {
    u.permissions.push(perm);
  }
  document.getElementById('main-content').innerHTML = renderAdminEditUser();
}

function adminApplyRoleDefaults() {
  var u = ADMIN_STATE.editingUser;
  if (!u) return;
  u.permissions = (ROLE_DEFAULTS[u.role] || []).slice();
  showToast('Reset to ' + u.role + ' defaults');
  document.getElementById('main-content').innerHTML = renderAdminEditUser();
}

function adminSaveUser() {
  var u = ADMIN_STATE.editingUser;
  if (!u || !u.name) { showToast('Name is required'); return; }
  var idx = USER_REGISTRY.findIndex(function(x) { return x.id === u.id; });
  if (idx !== -1) {
    USER_REGISTRY[idx] = JSON.parse(JSON.stringify(u));
    if (APP.profile && APP.profile.name === u.name) {
      APP.permissions = u.permissions.slice();
      buildBottomNav();
    }
  }
  // Sync to Supabase if user has a UUID id
  if (u.id && typeof u.id === 'string' && u.id.indexOf('-') !== -1) {
    db.from('profiles').update({
      name:     u.name,
      initials: u.initials,
      role:     u.role,
      region:   u.region,
      team:     u.team,
      active:   u.active
    }).eq('id', u.id)
    .then(function(r) {
      if (!r.error) {
        // Replace permissions: delete existing then re-insert
        db.from('permissions').delete().eq('user_id', u.id)
          .then(function() {
            var rows = u.permissions.map(function(p) { return { user_id: u.id, module: p }; });
            if (rows.length > 0) db.from('permissions').insert(rows).then(function(){});
          });
      }
    })
    .catch(function() {});
  }
  showToast('Saved — ' + u.name);
  ADMIN_STATE.section = 'users';
  ADMIN_STATE.editingUser = null;
  document.getElementById('main-content').innerHTML = renderAdminUsers();
}

    '<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;">' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;">Recent Posts</div>' +
      ANNOUNCEMENTS.slice(0,3).map(function(a) {
        return '<div style="padding:10px 0;border-bottom:1px solid var(--border);">' +
          '<div style="font-size:13px;font-weight:600;color:var(--white);">' + a.title + '</div>' +
          '<div style="font-size:11px;color:var(--muted);margin-top:2px;">' + a.tag + ' · ' + a.date + '</div>' +
          '</div>';
      }).join('') +
    '</div>'
  );
}

function adminAnnField(key, val) {
  if (ADMIN_STATE.announceDraft) ADMIN_STATE.announceDraft[key] = val;
}

function adminPostAnnouncement() {
  var d = ADMIN_STATE.announceDraft;
  if (!d || !d.title || !d.body) { showToast('Title and message are required'); return; }
  var tagClassMap = { Company:'purple', Competition:'gold', Trip:'green', Promotion:'purple', Urgent:'red' };
  var localAnn = {
    tag:      d.tag,
    tagClass: tagClassMap[d.tag] || 'purple',
    date:     new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}),
    title:    d.title,
    body:     d.body
  };
  ANNOUNCEMENTS.unshift(localAnn);

  // Write to Supabase
  db.from('announcements').insert({
    title:  d.title,
    body:   d.body,
    tag:    d.tag,
    tag_class: tagClassMap[d.tag] || 'purple',
    author: APP.profile ? APP.profile.name : 'Admin'
  })
  .then(function(r) {
    if (!r.error) showToast('Announcement live for all users');
    else showToast('Announcement posted locally');
  })
  .catch(function() { showToast('Announcement posted locally'); });

  ADMIN_STATE.announceDraft = { title:'', body:'', tag:'Company' };
  document.getElementById('main-content').innerHTML = renderAdminAnnounce();
}

// ── PLATFORM STATS ──
function renderAdminStats() {
  var total   = USER_REGISTRY.length;
  var active  = USER_REGISTRY.filter(function(u){return u.active;}).length;
  var mambaU  = USER_REGISTRY.filter(function(u){return u.team==='Mamba U';}).length;
  var spartanU= USER_REGISTRY.filter(function(u){return u.team==='Spartan U';}).length;
  var solarX  = USER_REGISTRY.filter(function(u){return u.team==='Solar X';}).length;
  var closers = USER_REGISTRY.filter(function(u){return u.role==='closer';}).length;
  var setters = USER_REGISTRY.filter(function(u){return u.role==='setter';}).length;
  var deals   = (CLOSER_STATE && CLOSER_STATE.deals) ? CLOSER_STATE.deals.length : 0;

  function statRow(label, val, color) {
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);">' +
      '<span style="font-size:13px;color:var(--white);">' + label + '</span>' +
      '<span style="font-size:16px;font-weight:700;color:' + (color||'var(--white)') + ';">' + val + '</span>' +
      '</div>';
  }

  return (
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">' +
      '<button onclick="adminBack()" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--white);font-family:var(--font-sans);font-size:13px;cursor:pointer;">‹ Back</button>' +
      '<div style="font-family:var(--font-serif);font-size:20px;font-weight:700;color:var(--white);">Platform Stats</div>' +
    '</div>' +

    '<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;margin-bottom:14px;">' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Users</div>' +
      statRow('Total Registered', total, 'var(--white)') +
      statRow('Active', active, 'var(--green)') +
      statRow('Inactive', total - active, 'var(--red)') +
    '</div>' +

    '<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;margin-bottom:14px;">' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Teams</div>' +
      statRow('Mamba U (Southern CA)', mambaU, 'var(--purple-light)') +
      statRow('Spartan U (Northern CA)', spartanU, 'var(--gold)') +
      statRow('Solar X (Puerto Rico)', solarX, 'var(--green)') +
    '</div>' +

    '<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;margin-bottom:14px;">' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Field Roles</div>' +
      statRow('Closers', closers, 'var(--green)') +
      statRow('Setters', setters, '#7eb4f0') +
    '</div>' +

    '<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;">' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Pipeline</div>' +
      statRow('Deals Logged', deals, 'var(--gold)') +
      statRow('Announcements Posted', ANNOUNCEMENTS.length, 'var(--purple-light)') +
    '</div>'
  );
}

// ─── LOGOUT ───
function doLogout() {
  db.auth.signOut().then(function() {
    APP.user = null;
    APP.profile = null;
    APP.permissions = [];
    showScreen('login');
    document.getElementById('login-email').value = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Sign In';
  });
}

// ─── TOAST ───
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2400);
}

// ─── BOOT ───
window.addEventListener('load', init);
</script>
